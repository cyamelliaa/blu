name: Build libPvpHud

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup NDK r26b
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b
          add-to-path: true

      - name: Clone Dear ImGui
        run: git clone --depth=1 https://github.com/ocornut/imgui deps/imgui

      - name: Clone and build Dobby
        run: |
          git clone --depth=1 https://github.com/jmpews/Dobby deps/Dobby
          mkdir deps/Dobby/build && cd deps/Dobby/build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DPlugin.Android.BionicLinker=ON
          cmake --build . -j$(nproc)
          find . -name "*.a"

      - name: Build
        run: |
          ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=jni/Android.mk \
            NDK_APPLICATION_MK=jni/Application.mk \
            -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libPvpHud
          path: libs/arm64-v8a/libPvpHud.so
