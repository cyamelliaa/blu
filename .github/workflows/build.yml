name: Build libPvpHud

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b
          add-to-path: true

      - name: Clone ImGui
        run: git clone --depth=1 https://github.com/ocornut/imgui deps/imgui

      - name: Clone Dobby
        run: git clone --depth=1 https://github.com/jmpews/Dobby deps/Dobby

      - name: Build Dobby
        run: |
          cd deps/Dobby
          cmake . -B build \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DPlugin.SymbolResolver=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Build mod
        run: |
          ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=jni/Android.mk \
            NDK_APPLICATION_MK=jni/Application.mk \
            -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: libPvpHud
          path: libs/arm64-v8a/libPvpHud.so
