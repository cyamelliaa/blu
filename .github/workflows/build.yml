name: Build libPvpHud

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b
          add-to-path: true

      - name: Clone ImGui
        run: git clone --depth=1 https://github.com/ocornut/imgui deps/imgui

      - name: Download prebuilt Dobby
        run: |
          mkdir -p deps/dobby/include deps/dobby/lib
          curl -L https://github.com/jmpews/Dobby/releases/download/v2.1/dobby_android_arm64.zip -o dobby.zip || \
          wget -q https://github.com/jmpews/Dobby/releases/download/v2.1/dobby_android_arm64.zip -O dobby.zip
          unzip -o dobby.zip -d deps/dobby/ || true
          # Also grab the header directly
          curl -L https://raw.githubusercontent.com/jmpews/Dobby/master/include/dobby.h \
            -o deps/dobby/include/dobby.h

      - name: Show dobby files
        run: find deps/dobby -type f

      - name: Build mod
        run: |
          ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=jni/Android.mk \
            NDK_APPLICATION_MK=jni/Application.mk \
            -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: libPvpHud
          path: libs/arm64-v8a/libPvpHud.so
